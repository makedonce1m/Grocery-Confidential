<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grocery">
  <meta name="theme-color" content="#111111">
  <title>Grocery Confidential</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">

    <!-- ── ITEMS VIEW ── -->
    <div id="view-items" class="view">
      <header class="app-header">
        <div class="header-title">
          <h1>Database</h1>
        </div>
        <div class="header-actions">
          <button class="header-btn" id="edit-mode-btn">Edit</button>
          <button class="header-btn header-btn-icon" id="fab-add-item" aria-label="Add item">+</button>
        </div>
      </header>

      <div class="search-wrap">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="search" id="search-input" placeholder="Search items…" autocomplete="off" autocorrect="off" autocapitalize="off">
          <button id="search-clear" class="search-clear" aria-label="Clear">✕</button>
        </div>
      </div>

      <div class="items-scroll">
        <div class="items-list" id="items-list"></div>
        <div class="empty-state" id="items-empty" hidden></div>
      </div>

      <div class="cat-bar">
        <div class="cat-select-wrap" id="cat-select-wrap">
          <button class="cat-select-btn" id="cat-select-btn">
            <span id="cat-select-label">All</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="cat-dropdown" id="cat-dropdown" hidden></div>
        </div>
      </div>
    </div>

    <!-- ── RECIPES VIEW ── -->
    <div id="view-recipes" class="view active">
      <header class="app-header">
        <div class="header-title">
          <h1>Recipes</h1>
        </div>
        <div class="header-actions">
          <button class="header-btn theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle theme">☀</button>
          <button class="header-btn" id="recipe-sort-btn">Sort</button>
          <button class="header-btn header-btn-icon" id="add-recipe-btn" aria-label="Add recipe">+</button>
        </div>
      </header>
      <div class="tag-filter-bar" id="tag-filter-bar">
        <div class="tag-filter-scroll">
          <button class="tag-filter-pill active" data-tag="all">All</button>
          <button class="tag-filter-pill" data-tag="breakfast">Breakfast</button>
          <button class="tag-filter-pill" data-tag="lunch">Lunch</button>
          <button class="tag-filter-pill" data-tag="dinner">Dinner</button>
          <button class="tag-filter-pill" data-tag="dessert">Dessert</button>
          <button class="tag-filter-pill" data-tag="sauces">Sauces</button>
          <button class="tag-filter-pill" data-tag="cocktails">Cocktails</button>
        </div>
      </div>
      <div class="items-scroll">
        <div class="recipe-list" id="recipe-list"></div>
        <div class="empty-state" id="recipes-empty" hidden>
          <button class="btn-primary" id="empty-add-recipe-btn">Add a recipe</button>
        </div>
      </div>
    </div>

    <!-- ── GROCERY LIST VIEW ── -->
    <div id="view-grocery" class="view">
      <header class="app-header">
        <div class="header-title">
          <h1>Grocery List</h1>
        </div>
        <button class="header-btn" id="clear-completed-btn">Clear done</button>
      </header>
      <div class="items-scroll">
        <div class="grocery-list" id="grocery-list"></div>
        <div class="empty-state" id="grocery-empty" hidden>
          <p>Your list is empty</p>
          <button class="btn-primary" id="go-browse-btn">Browse Items</button>
        </div>
      </div>
    </div>

    <!-- ── BOTTOM NAV ── -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-recipes" data-view="recipes" aria-label="Recipes">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
      <button class="nav-btn" id="nav-grocery" data-view="grocery" aria-label="Grocery list">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="nav-badge" id="grocery-badge" hidden>0</span>
      </button>
      <button class="nav-btn" id="nav-items" data-view="items" aria-label="Items">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6"  x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6"  r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="12" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="18" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </nav>

    <!-- ══ RECIPE DETAIL SLIDE PAGE ══ -->
    <div id="recipe-page" class="slide-page">
      <header class="app-header">
        <button class="header-btn" id="recipe-back-btn">‹ Back</button>
        <div class="header-actions">
          <button class="header-btn" id="recipe-delete-btn">Delete</button>
          <button class="header-btn" id="recipe-edit-btn">Edit</button>
        </div>
      </header>
      <div class="recipe-page-scroll" id="recipe-page-scroll">
        <div class="recipe-photo-wrap" id="recipe-page-photo-wrap">
          <img class="recipe-photo-img" id="recipe-page-photo" alt="" hidden>
          <div class="recipe-photo-placeholder" id="recipe-page-no-photo"></div>
          <div class="recipe-photo-tag-overlay" id="recipe-page-tag-overlay" hidden></div>
        </div>
        <div class="recipe-page-body">
          <div class="recipe-page-title-row">
            <h2 id="recipe-page-name"></h2>
            <button class="fav-btn" id="recipe-page-fav" aria-label="Toggle favourite">♡</button>
          </div>
          <div class="recipe-page-meta" id="recipe-page-meta"></div>
          <button class="btn-primary" id="recipe-add-grocery-btn" style="margin-bottom:16px">Add to groceries</button>
          <div class="recipe-page-section" id="recipe-page-ingredients-section">
            <h3 class="recipe-section-title">Ingredients</h3>
            <div id="recipe-page-ingredients"></div>
          </div>
          <div class="recipe-page-section" id="recipe-page-instructions-section">
            <h3 class="recipe-section-title">Instructions</h3>
            <div id="recipe-page-instructions"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ RECIPE FORM SLIDE PAGE ══ -->
    <div id="recipe-form-page" class="slide-page">
      <header class="app-header">
        <button class="header-btn" id="recipe-form-cancel">Cancel</button>
        <h1 id="recipe-form-title">New Recipe</h1>
        <button class="header-btn" id="recipe-form-save">Save</button>
      </header>
      <div class="recipe-form-scroll">
        <!-- Photo -->
        <div class="recipe-form-photo-wrap" id="recipe-form-photo-wrap">
          <input type="file" id="recipe-form-photo-input" accept="image/*" hidden>
          <img class="recipe-photo-img" id="recipe-form-photo-preview" alt="" hidden>
          <button class="recipe-form-photo-btn" id="recipe-form-photo-btn">+ Add Photo</button>
        </div>
        <div class="recipe-form-url-row">
          <input type="url" id="recipe-form-photo-url" placeholder="Or paste an image URL…" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>

        <div class="recipe-form-body">
          <!-- Name -->
          <div class="field">
            <label for="rf-name">Recipe Name <span class="req">*</span></label>
            <input type="text" id="rf-name" placeholder="e.g. Spaghetti Bolognese">
          </div>

          <!-- Tag -->
          <div class="field">
            <label for="rf-tag">Tag</label>
            <div class="select-wrap">
              <select id="rf-tag">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner" selected>Dinner</option>
                <option value="sauces">Sauces</option>
                <option value="dessert">Dessert</option>
                <option value="cocktails">Cocktails</option>
              </select>
            </div>
          </div>

          <!-- Times + Servings -->
          <div class="recipe-form-row">
            <div class="field">
              <label for="rf-prep">Prep (min)</label>
              <input type="number" id="rf-prep" min="0" placeholder="0">
            </div>
            <div class="field">
              <label for="rf-cook">Cook (min)</label>
              <input type="number" id="rf-cook" min="0" placeholder="0">
            </div>
            <div class="field">
              <label for="rf-servings">Servings</label>
              <input type="number" id="rf-servings" min="1" placeholder="4">
            </div>
          </div>

          <!-- Ingredients -->
          <div class="field">
            <label>Ingredients</label>
            <div id="rf-ingredients-list"></div>
            <button class="btn-secondary" id="rf-add-ingredient-btn" type="button">+ Add ingredient</button>
          </div>

          <!-- Instructions -->
          <div class="field">
            <label>Instructions</label>
            <div id="rf-instructions-list"></div>
            <button class="btn-secondary" id="rf-add-step-btn" type="button">+ Add step</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Add to Groceries ── -->
    <div class="modal-overlay" id="modal-add-to-grocery" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="atg-recipe-name">Add to groceries</h2>
          <button class="modal-close" data-modal="modal-add-to-grocery">✕</button>
        </div>
        <div class="atg-servings-row">
          <span class="atg-servings-label">Servings</span>
          <select id="atg-servings-select" class="atg-servings-select">
            <option value="0.5">½</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="modal-body atg-body" style="padding-bottom:0">
          <div id="atg-ingredients-list"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-add-to-grocery">Cancel</button>
          <button class="btn-primary" id="atg-confirm-btn">Add to list</button>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Add Item ── -->
    <div class="modal-overlay" id="modal-add-item" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Add Item</h2>
          <button class="modal-close" data-modal="modal-add-item">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="item-name">Item Name <span class="req">*</span></label>
            <input type="text" id="item-name" placeholder="e.g. Organic Apples">
          </div>
          <div class="field">
            <label for="item-category">Category <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="item-category"></select>
            </div>
          </div>
          <div class="field">
            <label for="item-unit">Unit <span class="opt">(optional)</span></label>
            <input type="text" id="item-unit" placeholder="e.g. kg, bunch, pack">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-add-item">Cancel</button>
          <button class="btn-primary" id="confirm-add-item">Add Item</button>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Add Category ── -->
    <div class="modal-overlay" id="modal-add-category" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>New Category</h2>
          <button class="modal-close" data-modal="modal-add-category">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="cat-name">Category Name <span class="req">*</span></label>
            <input type="text" id="cat-name" placeholder="e.g. International Foods">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-add-category">Cancel</button>
          <button class="btn-primary" id="confirm-add-category">Add Category</button>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Confirm Delete Category ── -->
    <div class="modal-overlay" id="modal-confirm-del-cat" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Delete Category</h2>
          <button class="modal-close" data-modal="modal-confirm-del-cat">✕</button>
        </div>
        <div class="modal-body">
          <p id="confirm-del-cat-msg" class="confirm-msg"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-confirm-del-cat">Cancel</button>
          <button class="btn-danger" id="confirm-del-cat-btn">Delete</button>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Confirm Delete Recipe ── -->
    <div class="modal-overlay" id="modal-confirm-del-recipe" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Delete Recipe</h2>
          <button class="modal-close" data-modal="modal-confirm-del-recipe">✕</button>
        </div>
        <div class="modal-body">
          <p class="confirm-msg">Are you sure you want to delete this recipe?</p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-confirm-del-recipe">Cancel</button>
          <button class="btn-danger" id="confirm-del-recipe-btn">Delete</button>
        </div>
      </div>
    </div>

    <!-- ── TOAST ── -->
    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <script src="listdatabase.js"></script>
  <script src="app.js"></script>
</body>
</html>

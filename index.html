<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grocery">
  <meta name="theme-color" content="#2D6A4F">
  <title>Grocery Confidential</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">

    <!-- ── ITEMS VIEW ── -->
    <div id="view-items" class="view active">
      <header class="app-header">
        <div class="header-title">
          <span class="header-logo">🛒</span>
          <h1>Grocery Confidential</h1>
        </div>
      </header>

      <div class="search-wrap">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="search" id="search-input" placeholder="Search items…" autocomplete="off" autocorrect="off" autocapitalize="off">
          <button id="search-clear" class="search-clear" aria-label="Clear">✕</button>
        </div>
      </div>

      <div class="pills-wrap">
        <div class="pills" id="category-pills"></div>
      </div>

      <div class="items-scroll">
        <div class="items-list" id="items-list"></div>
        <div class="empty-state" id="items-empty" hidden>
          <span>🔍</span>
          <p>No items found</p>
          <button class="btn-primary" id="empty-add-btn">Add an item</button>
        </div>
      </div>

      <button class="fab" id="fab-add-item" aria-label="Add item">+</button>
    </div>

    <!-- ── GROCERY LIST VIEW ── -->
    <div id="view-grocery" class="view">
      <header class="app-header">
        <div class="header-title">
          <span class="header-logo">🛍️</span>
          <h1>Grocery List</h1>
        </div>
        <button class="header-btn" id="clear-completed-btn">Clear done</button>
      </header>

      <div class="items-scroll">
        <div class="grocery-list" id="grocery-list"></div>
        <div class="empty-state" id="grocery-empty" hidden>
          <span>🛒</span>
          <p>Your list is empty</p>
          <button class="btn-primary" id="go-browse-btn">Browse Items</button>
        </div>
      </div>
    </div>

    <!-- ── BOTTOM NAV ── -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-items" data-view="items">
        <span class="nav-icon">🥦</span>
        <span class="nav-label">Items</span>
      </button>
      <button class="nav-btn" id="nav-grocery" data-view="grocery">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Grocery</span>
        <span class="nav-badge" id="grocery-badge" hidden>0</span>
      </button>
    </nav>

    <!-- ── MODAL: Add Item ── -->
    <div class="modal-overlay" id="modal-add-item" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Add Item</h2>
          <button class="modal-close" data-modal="modal-add-item">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="item-name">Item Name <span class="req">*</span></label>
            <input type="text" id="item-name" placeholder="e.g. Organic Apples">
          </div>
          <div class="field">
            <label for="item-category">Category <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="item-category"></select>
            </div>
          </div>
          <div class="field">
            <label for="item-unit">Unit <span class="opt">(optional)</span></label>
            <input type="text" id="item-unit" placeholder="e.g. kg, bunch, pack">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-add-item">Cancel</button>
          <button class="btn-primary" id="confirm-add-item">Add Item</button>
        </div>
      </div>
    </div>

    <!-- ── MODAL: Add Category ── -->
    <div class="modal-overlay" id="modal-add-category" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>New Category</h2>
          <button class="modal-close" data-modal="modal-add-category">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="cat-emoji">Emoji</label>
            <input type="text" id="cat-emoji" placeholder="📦" maxlength="2">
          </div>
          <div class="field">
            <label for="cat-name">Category Name <span class="req">*</span></label>
            <input type="text" id="cat-name" placeholder="e.g. International Foods">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-modal="modal-add-category">Cancel</button>
          <button class="btn-primary" id="confirm-add-category">Add Category</button>
        </div>
      </div>
    </div>

    <!-- ── TOAST ── -->
    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Square green background -->
  <rect width="512" height="512" fill="#52B788"/>

  <!-- Cart handle -->
  <path d="M100 148 L168 148 L222 352 L388 352"
        fill="none" stroke="white" stroke-width="36"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cart basket top edge -->
  <line x1="198" y1="228" x2="408" y2="228"
        stroke="white" stroke-width="36"
        stroke-linecap="round"/>

  <!-- Cart basket right edge -->
  <line x1="408" y1="228" x2="388" y2="352"
        stroke="white" stroke-width="36"
        stroke-linecap="round"/>

  <!-- Left wheel -->
  <circle cx="252" cy="408" r="36" fill="white"/>
  <circle cx="252" cy="408" r="16" fill="#52B788"/>

  <!-- Right wheel -->
  <circle cx="370" cy="408" r="36" fill="white"/>
  <circle cx="370" cy="408" r="16" fill="#52B788"/>
</svg>
